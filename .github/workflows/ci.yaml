name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-build-linux-amd64-${{ hashFiles('**/go.mod', '**/go.sum') }}
          restore-keys: go-build-linux-amd64-
      - name: Install clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang
      - run: go test ./...

  # Build on macOS to warm the cache for release workflow
  build-cache-macos:
    runs-on: macos-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/Library/Caches/go-build
          key: go-build-darwin-arm64-${{ hashFiles('**/go.mod', '**/go.sum') }}
          restore-keys: go-build-darwin-arm64-
      - name: Build
        env:
          CGO_ENABLED: 1
          CC: clang
          CXX: clang++
        run: go build ./cmd/bqtest/
